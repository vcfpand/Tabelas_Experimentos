<!DOCTYPE html>

  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <div class="main">

      <div class="panel" id="panel2"></div>
      <div class="panel" id="panel3"></div>

<script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
